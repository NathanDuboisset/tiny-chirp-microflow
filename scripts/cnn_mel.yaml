# Axon NPU compile config for cnn_mel — input is [1, 184, 80, 1] int8
# mel-spectrogram, output is [1, 2] (non_target, target).

cnn_mel:
  tflite_model: ../../models/cnn_mel_tf.tflite
  model_name: cnn_mel
  classification_labels: ["non_target", "target"]
  interlayer_buffer_size: 120000
  psum_buffer_size: 180000
  conv2d_setting: local_psum
  psum_buffer_placement: interlayer_buffer
  normalize_scaleshift: True
  disable_op_quantization: True
  skip_softmax_op: False
  run_all_variants: False
  log_level: info
