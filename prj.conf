CONFIG_NCS_SAMPLES_DEFAULTS=y

# cnn_mel needs 72960; sincnet_chunked needs 353280. nRF54LM20B has 511 KB SRAM,
# so a 360000-byte interlayer covers both with headroom.
CONFIG_NRF_AXON=y
CONFIG_NRF_AXON_INTERLAYER_BUFFER_SIZE=360000
CONFIG_NRF_AXON_PSUM_BUFFER_SIZE=0

CONFIG_PICOLIBC_IO_FLOAT=y
CONFIG_MAIN_STACK_SIZE=4096

# CMSIS-DSP for the mel_cpu backend (1024-pt rfft on the Cortex-M33).
CONFIG_CMSIS_DSP=y
CONFIG_CMSIS_DSP_TRANSFORM=y
CONFIG_CMSIS_DSP_COMPLEXMATH=y
