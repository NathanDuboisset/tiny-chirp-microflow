CONFIG_NCS_SAMPLES_DEFAULTS=y

# Axon NPU driver. Buffer sizes seeded from sdk-edge-ai KWS sample; tighten
# after the first compile using the .h's MAX_IL_BUFFER_USED / MAX_PSUM_BUFFER_USED.
CONFIG_NRF_AXON=y
# cnn_mel reports MAX_IL_BUFFER_USED=72960, MAX_PSUM_BUFFER_USED=0 — sized
# with a small margin. Bump these if you swap models.
CONFIG_NRF_AXON_INTERLAYER_BUFFER_SIZE=80000
CONFIG_NRF_AXON_PSUM_BUFFER_SIZE=0

CONFIG_PICOLIBC_IO_FLOAT=y
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_LOG=y
